            function parseLabeled(str) {
                const parts = str.split(/[,\n]+/).map(s => s.trim()).filter(Boolean);
                const labels = [],
                    vals = [];
                parts.forEach((p, i) => {
                    if (p.includes(':')) { const [l, v] = p.split(':');
                        labels.push(l.trim());
                        vals.push(Number(v)); } else { labels.push('#' + (i + 1));
                        vals.push(Number(p)); }
                });
                return { labels, vals: vals.filter(v => !Number.isNaN(v)) };
            }

            function drawBarLine(canvas, labels, vals, style) {
                const { ctx, w, h } = setupCanvas(canvas);
                const p = { l: 34, r: 10, t: 14, b: 24 };
                const pw = w - p.l - p.r,
                    ph = h - p.t - p.b,
                    n = vals.length;
                const mx = Math.max(...vals, 0),
                    mn = Math.min(...vals, 0);
                axes(ctx, w, h, p);
                const toY = v => p.t + ph - ((v - mn) / ((mx - mn) || 1)) * ph;
                if (style === 'area' || style === 'line') {
                    ctx.beginPath();
                    vals.forEach((v, i) => { const x = p.l + (i + 0.5) * (pw / n),
                            y = toY(v);
                        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
                    if (style === 'area') {
                        ctx.lineTo(p.l + (n - 0.5) * (pw / n), h - p.b);
                        ctx.lineTo(p.l + 0.5 * (pw / n), h - p.b);
                        ctx.closePath();
                        const g = ctx.createLinearGradient(0, p.t, 0, h - p.b);
                        g.addColorStop(0, CV + '77');
                        g.addColorStop(1, CV + '08');
                        ctx.fillStyle = g;
                        ctx.fill();
                        ctx.beginPath();
                        vals.forEach((v, i) => { const x = p.l + (i + 0.5) * (pw / n),
                                y = toY(v);
                            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
                    }
                    const lg = ctx.createLinearGradient(0, 0, w, 0);
                    lg.addColorStop(0, CV);
                    lg.addColorStop(1, CY);
                    ctx.strokeStyle = lg;
                    ctx.lineWidth = 2.4;
                    ctx.stroke();
                    ctx.fillStyle = CY;
                    vals.forEach((v, i) => { const x = p.l + (i + 0.5) * (pw / n),
                            y = toY(v);
                        ctx.beginPath();
                        ctx.arc(x, y, 2.6, 0, Math.PI * 2);
                        ctx.fill(); });
                } else {
                    vals.forEach((v, i) => {
                        const x = p.l + i * (pw / n) + 2,
                            bw = pw / n - 4,
                            y0 = toY(0),
                            y1 = toY(v);
                        const g = ctx.createLinearGradient(0, Math.min(y0, y1), 0, Math.max(y0, y1));
                        g.addColorStop(0, CV + 'cc');
                        g.addColorStop(1, CY + '66');
                        ctx.fillStyle = g;
                        ctx.fillRect(x, Math.min(y0, y1), bw, Math.abs(y1 - y0) || 1);
                    });
                }
                ctx.fillStyle = '#94a3b8';
                ctx.font = '9px JetBrains Mono,monospace';
                ctx.textAlign = 'center';
                labels.forEach((l, i) => { if (n <= 14) ctx.fillText(l.slice(0, 4), p.l + (i + 0.5) * (pw / n), h -
                        6); });
            }

            function drawPie(canvas, labels, vals) {
                const { ctx, w, h } = setupCanvas(canvas);
                const cx = w / 2,
                    cy = h / 2,
                    r = Math.min(w, h) / 2 - 16;
                const total = vals.reduce((a, b) => a + b, 0) || 1;
                let ang = -Math.PI / 2;
                const cols = [CV, CY, CA, '#ff5e8a', '#2fa860', '#c98a5e', '#a8651f', '#7a6a5c'];
                vals.forEach((v, i) => {
                    const sl = (v / total) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, r, ang, ang + sl);
                    ctx.closePath();
                    ctx.fillStyle = cols[i % cols.length];
                    ctx.fill();
                    ang += sl;
                });
                ctx.fillStyle = '#1e293b';
                ctx.font = '9px JetBrains Mono,monospace';
                ctx.textAlign = 'left';
                labels.forEach((l, i) => { ctx.fillStyle = cols[i % cols.length];
                    ctx.fillRect(4, 4 + i * 11, 7, 7);
                    ctx.fillStyle = '#1e293b';
                    ctx.fillText(l + ' (' + fmt(vals[i] / total * 100, 1) + '%)', 14, 10 + i * 11); });
            }

            function drawBox(canvas, vals) {
                const { ctx, w, h } = setupCanvas(canvas);
                const p = { l: 34, r: 14, t: 16, b: 20 };
                const s = [...vals].sort((a, b) => a - b),
                    n = s.length;
                const q1 = s[Math.floor(n * 0.25)],
                    q2 = s[Math.floor(n * 0.5)],
                    q3 = s[Math.floor(n * 0.75)];
                const mn = s[0],
                    mx = s[n - 1];
                const pw = w - p.l - p.r,
                    ph = h - p.t - p.b;
                const toY = v => p.t + ph - ((v - mn) / ((mx - mn) || 1)) * ph;
                axes(ctx, w, h, p);
                const cx = p.l + pw / 2;
                ctx.strokeStyle = CV;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cx, toY(mn));
                ctx.lineTo(cx, toY(q1));
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx, toY(q3));
                ctx.lineTo(cx, toY(mx));
                ctx.stroke();
                ctx.fillStyle = CV + '33';
                ctx.fillRect(cx - 40, toY(q3), 80, toY(q1) - toY(q3));
                ctx.strokeRect(cx - 40, toY(q3), 80, toY(q1) - toY(q3));
                ctx.strokeStyle = CY;
                ctx.beginPath();

                ctx.fillText('Q3 ' + fmt(q3, 2), cx + 46, toY(q3));

            function drawHeatmap(canvas, vals) {
                const { ctx, w, h } = setupCanvas(canvas);

                    cols = Math.ceil(Math.sqrt(n)),
                    rows = Math.ceil(n / cols);

                    ch = h / rows,
                    mx = Math.max(...vals),
                    mn = Math.min(...vals);
                vals.forEach((v, i) => {
                    const r = Math.floor(i / cols),
                        c = i % cols,
                        t = (v - mn) / ((mx - mn) || 1);
                    ctx.fillStyle =
                        `rgba(${Math.round(56+t*180)},${Math.round(217-t*140)},${Math.round(192-t*150)},0.9)`;
                    ctx.fillRect(c * cw + 1, r * ch + 1, cw - 2, ch - 2);

            function drawCandle(canvas, rows) {
                const { ctx, w, h } = setupCanvas(canvas);
                const p = { l: 34, r: 10, t: 14, b: 20 };
                const pw = w - p.l - p.r,
                    ph = h - p.t - p.b,
                    n = rows.length;
                const allV = rows.flatMap(r => [r[1], r[2]]);
                const mx = Math.max(...allV),
                    mn = Math.min(...allV);
                const toY = v => p.t + ph - ((v - mn) / ((mx - mn) || 1)) * ph;
                axes(ctx, w, h, p);
                rows.forEach((r, i) => {
                    const [o, hi, lo, cl] = r,
                        x = p.l + (i + 0.5) * (pw / n),
                        up = cl >= o;

                    ctx.lineWidth = 1;

                    ctx.moveTo(x, toY(hi));
                    ctx.lineTo(x, toY(lo));
                    ctx.stroke();

                    const bw = Math.max(pw / n - 4, 3),

                try {
                    if (ctype === 'candle') {
                        const rows = document.getElementById('chartOhlc').value.trim().split('\n').map(l => l
                            .split(',').map(Number)).filter(r => r.length === 4 && !r.some(Number.isNaN));
                        if (rows.length < 1) throw new Error('Enter at least one OHLC row.');
                        drawCandle(canvas, rows);
                    } else if (ctype === 'scatter') {
                        const xs = parseNums(document.getElementById('chartX').value),
                            ys = parseNums(document.getElementById('chartY').value);
                        if (xs.length < 2 || ys.length < 2 || xs.length !== ys.length) throw new Error(
                            'X and Y need equal length, ≥2 values.');
                        const n = xs.length,
                            mx = mean(xs),
                            my = mean(ys);
                        let num = 0,
                            den = 0;
                        xs.forEach((x, i) => { num += (x - mx) * (ys[i] - my);
                            den += (x - mx) ** 2; });
                        const slope = den ? num / den : 0,
                            intercept = my - slope * mx;

                    } else if (ctype === 'pie') {

                    } else if (ctype === 'hist') {
                        const vals = parseNums(document.getElementById('chartX').value);
                        if (vals.length < 3) throw new Error('Enter at least 3 values.');
                        drawHistogram(canvas, vals, Math.min(12, Math.max(5, Math.round(Math.sqrt(vals.length)))));
                    } else if (ctype === 'box' || ctype === 'violin') {
                        const vals = parseNums(document.getElementById('chartX').value);
                        if (vals.length < 4) throw new Error('Enter at least 4 values.');
                        drawBox(canvas, vals);
                    } else if (ctype === 'heatmap') {
                        const vals = parseNums(document.getElementById('chartX').value);
                        if (vals.length < 2) throw new Error('Enter at least 2 values.');
                        drawHeatmap(canvas, vals);
                    } else {
                        const { labels, vals } = parseLabeled(document.getElementById('chartX').value);
                        if (vals.length < 1) throw new Error('Enter at least one value.');
                        drawBarLine(canvas, labels, vals, ctype);
                    }
                    card.hidden = false;
                } catch (e) { err.textContent = e.message; }
            });
            document.getElementById('chartClearBtn').addEventListener('click', () => {
                document.getElementById('chartX').value = '';
                document.getElementById('chartY').value = '';
                document.getElementById('chartOhlc').value = '';
                document.getElementById('chartError').textContent = '';
                document.getElementById('chartCard').hidden = true;
            });
            document.getElementById('chartExportPng').addEventListener('click', () => exportPNG(
                'statlab-chart.png', document.getElementById('chartCanvas')));
            document.getElementById('chartExportCsv').addEventListener('click', () => {
                const data = parseNums(document.getElementById('chartX').value);
                if (!data.length) return;
                const rows = [
                    ['value'],
                    ...data.map(v => [v])
                ];
                exportCSV('statlab-chart-data.csv', rows);
            });
            document.getElementById('chartExportJson').addEventListener('click', () => {
                const data = parseNums(document.getElementById('chartX').value);
                if (!data.length) return;
                exportJSON('statlab-chart-data.json', { values: data });
            });
        })();

        // ---- TRADING ----
        (function() {
            let lastResult = null;

            function sma(arr, n) { return arr.map((_, i) => i < n - 1 ? null : arr.slice(i - n + 1, i + 1).reduce((a,
                    b) => a + b, 0) / n); }

            function ema(arr, n) { const k = 2 / (n + 1);
                let prev; return arr.map((v, i) => { if (i === 0) { prev = v; return v; } prev = v * k + prev * (1 - k); return prev; }); }

            function rsi(arr, n) {
                const out = new Array(arr.length).fill(null);
                let gains = 0,
                    losses = 0;
                for (let i = 1; i < arr.length; i++) {
                    const ch = arr[i] - arr[i - 1],
                        g = Math.max(ch, 0),
                        l = Math.max(-ch, 0);
                    if (i <= n) { gains += g;
                        losses += l; if (i === n) { out[i] = losses === 0 ? 100 : 100 - 100 / (1 + gains / losses); } } else {
                        gains = (gains * (n - 1) + g) / n;
                        losses = (losses * (n - 1) + l) / n;
                        out[i] = losses === 0 ? 100 : 100 - 100 / (1 + gains / losses); }
                }
                return out;
            }

            function drawTrading(canvas, prices, smaArr, upperBB, lowerBB) {
                const { ctx, w, h } = setupCanvas(canvas);
                const p = { l: 36, r: 10, t: 14, b: 20 };
                const pw = w - p.l - p.r,
                    ph = h - p.t - p.b,
                    n = prices.length;
                const all = [...prices, ...upperBB.filter(v => v !== null), ...lowerBB.filter(v => v !== null)];
                const mx = Math.max(...all),
                    mn = Math.min(...all);
                const toX = i => p.l + (i / (n - 1)) * pw,
                    toY = v => p.t + ph - ((v - mn) / ((mx - mn) || 1)) * ph;
                axes(ctx, w, h, p);

                function line(arr, color, width, dash) {
                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    if (dash) ctx.setLineDash(dash);
                    else ctx.setLineDash([]);
                    ctx.beginPath();
                    let started = false;
                    arr.forEach((v, i) => { if (v === null) return;
                        const x = toX(i),
                            y = toY(v); if (!started) { ctx.moveTo(x, y);
                            started = true; } else ctx.lineTo(x, y); });
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                line(upperBB, CA + '99', 1.3, [4, 3]);
                line(lowerBB, CA + '99', 1.3, [4, 3]);
                line(prices, CY, 2.2);
                line(smaArr, CV, 1.8);
                ctx.fillStyle = '#94a3b8';
                ctx.font = '9px JetBrains Mono,monospace';
                ctx.textAlign = 'left';
                ctx.fillText(fmt(mx, 1), 2, p.t + 8);
                ctx.textAlign = 'left';
                ctx.fillText(fmt(mn, 1), 2, h - p.b - 2);
            }

            document.getElementById('tdCalcBtn').addEventListener('click', () => {
                const err = document.getElementById('tdError'),
                    grid = document.getElementById('tdGrid'),
                    chartCard = document.getElementById('tdChartCard');
                err.textContent = '';
                grid.hidden = true;
                chartCard.hidden = true;
                try {
                    const prices = parseNums(document.getElementById('tdPrices').value);
                    const n = parseInt(document.getElementById('tdWindow').value, 10);
                    const rf = parseFloat(document.getElementById('tdRf').value) / 100;
                    if (prices.length < Math.max(n + 1, 5)) throw new Error('Need at least ' + Math.max(n +
                        1, 5) + ' prices for window n=' + n + '.');
                    const smaArr = sma(prices, n),
                        emaArr = ema(prices, n);
                    const sd_ = [];
                    for (let i = 0; i < prices.length; i++) { if (i < n - 1) { sd_.push(null); continue; } const win =
                            prices.slice(i - n + 1, i + 1);
                        const m = smaArr[i];
                        sd_.push(Math.sqrt(win.reduce((a, v) => a + (v - m) ** 2, 0) / n)); }
                    const upperBB = smaArr.map((m, i) => m === null ? null : m + 2 * sd_[i]);
                    const lowerBB = smaArr.map((m, i) => m === null ? null : m - 2 * sd_[i]);
                    const rsiArr = rsi(prices, Math.min(n, prices.length - 1));
                    const rets = [];
                    for (let i = 1; i < prices.length; i++) rets.push((prices[i] - prices[i - 1]) / prices[i -
                    1]);
                    const meanRet = mean(rets),
                        volRet = sd(rets, true);
                    const annVol = volRet * Math.sqrt(252) * 100;
                    const annRet = meanRet * 252;
                    const sharpe = (annRet - rf) / (volRet * Math.sqrt(252) || 1e-9);
                    const totalReturn = ((prices[prices.length - 1] - prices[0]) / prices[0]) * 100;
                    const lastRsi = [...rsiArr].reverse().find(v => v !== null);
                    grid.innerHTML =
                        tile('Latest price', fmt(prices[prices.length - 1], 2), { hi: true }) +
                        tile('Total return', fmt(totalReturn, 2) + '%', { cyan: true }) +
                        tile('SMA(' + n + ')', fmt(smaArr[smaArr.length - 1], 2)) +
                        tile('EMA(' + n + ')', fmt(emaArr[emaArr.length - 1], 2)) +
                        tile('RSI', lastRsi !== undefined ? fmt(lastRsi, 1) : '—') +
                        tile('Daily volatility', fmt(volRet * 100, 3) + '%') +
                        tile('Annualized vol.', fmt(annVol, 2) + '%') +
                        tile('Annualized return', fmt(annRet * 100, 2) + '%') +
                        tile('Sharpe ratio', fmt(sharpe, 3), { wide: true, hi: true });
                    grid.hidden = false;
                    drawTrading(document.getElementById('tdCanvas'), prices, smaArr, upperBB, lowerBB);
                    chartCard.hidden = false;
                    lastResult = {
                        prices,
                        n,
                        sma: smaArr,
                        ema: emaArr,
                        upperBB,
                        lowerBB,
                        rsi: rsiArr,
                        returns: rets,
                        annualizedVolPct: annVol,
                        annualizedReturnPct: annRet * 100,
                        sharpeRatio: sharpe,
                        totalReturnPct: totalReturn
                    };
                } catch (e) { err.textContent = e.message; }
            });
            document.getElementById('tdClearBtn').addEventListener('click', () => {
                document.getElementById('tdPrices').value = '';
                document.getElementById('tdError').textContent = '';
                document.getElementById('tdGrid').hidden = true;
                document.getElementById('tdChartCard').hidden = true;
                lastResult = null;
            });
            document.getElementById('tdExportPng').addEventListener('click', () => exportPNG(
                'statlab-trading.png', document.getElementById('tdCanvas')));
            document.getElementById('tdExportCsv').addEventListener('click', () => {
                if (!lastResult) return;
                const rows = [
                    ['i', 'price', 'sma', 'ema', 'upperBB', 'lowerBB', 'rsi']
                ];
                lastResult.prices.forEach((pr, i) => rows.push([i, pr, lastResult.sma[i], lastResult.ema[
                    i], lastResult.upperBB[i], lastResult.lowerBB[i], lastResult.rsi[i]]));
                exportCSV('statlab-trading.csv', rows);
            });
            document.getElementById('tdExportJson').addEventListener('click', () => { if (lastResult) exportJSON(
                    'statlab-trading.json', lastResult); });
        })();

        // ---- EXPORT HELPERS ----
        function downloadBlob(filename, content, mime) {
            const blob = new Blob([content], { type: mime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(a.href), 2000);
        }

        function toCSV(rows) { return rows.map(r => r.map(v => { v = String(v); return /[",\n]/.test(v) ? '"' + v.replace(
                /"/g, '""') + '"' : v; }).join(',')).join('\n'); }

        function exportCSV(filename, rows) { downloadBlob(filename, toCSV(rows), 'text/csv'); }

        function exportJSON(filename, obj) { downloadBlob(filename, JSON.stringify(obj, null, 2), 'application/json'); }

        function exportPNG(filename, canvas) { canvas.toBlob(b => { const a = document.createElement('a');
                a.href = URL.createObjectURL(b);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(a.href), 2000); }); }

        // ---- INIT ----
        updateBottomBar();
    </script>
</body>
